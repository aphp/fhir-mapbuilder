name: Package and Release VS Code Extension

on:
  push:
    tags:
      - 'v*'  # Déclenché sur les tags v1.0.0, v2.3.1, etc.

# Principe du moindre privilège : seules les permissions nécessaires sont accordées
permissions:
  contents: write  # Requis pour créer la GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Lit la contrainte engines.node du package.json — plus de version en dur
          node-version-file: vscode-extension/package.json
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install Node dependencies
        # npm ci garantit une installation strictement reproductible depuis package-lock.json
        run: npm ci
        working-directory: vscode-extension

      - name: Run tests (with xvfb)
        run: xvfb-run -a npm test
        working-directory: vscode-extension

      - name: Build JAR with Maven
        run: mvn --batch-mode --no-transfer-progress clean package
        working-directory: fhir-mapbuilder-validation

      - name: Move JAR to VS Code extension
        run: |
          mkdir -p vscode-extension/target
          mv fhir-mapbuilder-validation/target/fhir-mapbuilder-validation.jar vscode-extension/target

      - name: Package extension
        # vsce est dans devDependencies — pas besoin d'un install -g séparé
        run: npx vsce package --baseImagesUrl=https://raw.githubusercontent.com/aphp/fhir-mapbuilder/refs/heads/main/vscode-extension
        working-directory: vscode-extension

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vscode-extension/*.vsix
          generate_release_notes: true  # Génère automatiquement les notes de release depuis les commits